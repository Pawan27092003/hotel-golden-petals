<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Petals</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Jost&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Jost',sans-serif;
  background:#F5F7F6;
  overflow-x:hidden;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  width:80px;
  height:100vh;
  background:#1F3D3B;
  transition:0.4s;
  overflow:hidden;
  z-index:1000;
}
.sidebar:hover{width:200px;}

.sidebar ul{
  list-style:none;
  padding-top:50px;
}

.sidebar ul li a{
  display:flex;
  align-items:center;
  padding:15px;
  color:white;
  text-decoration:none;
  gap:10px;
}

.sidebar ul li a span{
  opacity:0;
  transition:0.3s;
}

.sidebar:hover span{
  opacity:1;
}

/* MAIN */
.main{
  margin-left:80px;
  padding:40px;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  background:linear-gradient(135deg,#1F3D3B,#5DA9E9);
  color:white;
}

.hero h1{
  font-size:50px;
  font-family:'Cormorant Garamond',serif;
}

/* GALLERY */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.gallery img{
  width:100%;
  border-radius:10px;
}

/* ROOMS */
.room-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
}

/* AMENITIES */
.amenity-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.amenity-grid div{
  background:white;
  padding:15px;
  border-radius:8px;
}

/* CONTACT */
form{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:400px;
}

input,textarea{
  padding:10px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:12px 20px;
  border-radius:30px;
  color:white;
  text-decoration:none;
}

/* MOBILE FIX */
@media(max-width:768px){
  .sidebar{
    width:60px;
  }
  .main{
    margin-left:60px;
  }
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<ul>
<li><a href="#home">🏠 <span>Home</span></a></li>
<li><a href="#gallery">🖼️ <span>Gallery</span></a></li>
<li><a href="#rooms">🛏️ <span>Rooms</span></a></li>
<li><a href="#amenities">✨ <span>Amenities</span></a></li>
<li><a href="#contact">📞 <span>Contact</span></a></li>
</ul>
</div>

<div class="main">

<section id="home" class="hero">
<h1>Golden Petals</h1>
<p>Minimal · Natural · Premium</p>
</section>

<section id="gallery">
<h2>Gallery</h2>
<div class="gallery-grid">
<img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800">
<img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=800">
<img src="https://images.unsplash.com/photo-1590490360182-c33d57733427?w=800">
</div>
</section>

<section id="rooms">
<h2>Rooms</h2>
<div class="room-grid">
<div class="card">
<img src="https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=800">
<h3>Deluxe</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=800">
<h3>Executive</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1590490360182-c33d57733427?w=800">
<h3>Suite</h3>
</div>
</div>
</section>

<section id="amenities">
<h2>Amenities</h2>
<div class="amenity-grid">
<div>WiFi</div>
<div>Parking</div>
<div>AC</div>
<div>Room Service</div>
</div>
</section>

<section id="contact">
<h2>Contact</h2>
<form id="form">
<input type="text" id="name" placeholder="Name" required>
<input type="tel" id="phone" placeholder="Phone" required>
<textarea id="msg" placeholder="Message"></textarea>
<button type="submit">Send</button>
</form>
</section>

</div>

<a href="#" id="waBtn" class="whatsapp">Book</a>

<script>

// WAIT FOR PAGE LOAD
document.addEventListener("DOMContentLoaded", function(){

  // WHATSAPP BUTTON
  document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let msg = document.getElementById("msg").value;

    let url = "https://wa.me/91XXXXXXXXXX?text="
      + "Name: " + name + "%0A"
      + "Phone: " + phone + "%0A"
      + "Message: " + msg;

    window.open(url, "_blank");
  });

  // SIMPLE ANIMATION (NO GSAP ERROR)
  document.querySelectorAll("section").forEach(sec=>{
    sec.style.opacity=0;
    setTimeout(()=>{sec.style.opacity=1;},300);
  });

});

</script>

</body>
</html>

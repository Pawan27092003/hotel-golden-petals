<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Petals</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Jost&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jost',sans-serif;background:#f5f7f6;color:#222}

/* SIDEBAR */
.sidebar{
  position:fixed;
  width:80px;
  height:100vh;
  background:#1F3D3B;
  transition:0.4s;
}
.sidebar:hover{width:220px;}

.sidebar a{
  display:flex;
  padding:15px;
  color:white;
  text-decoration:none;
  gap:10px;
}
.sidebar span{opacity:0;}
.sidebar:hover span{opacity:1;}

.main{margin-left:80px;transition:0.4s;}
.sidebar:hover ~ .main{margin-left:220px;}

/* HERO */
.hero{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1590490360182-c33d57733427?w=1600') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
}
.hero h1{
  font-size:60px;
  font-family:'Cormorant Garamond';
}
.hero p{margin-top:10px}

/* SECTION */
section{padding:60px}

/* ROOMS */
.rooms-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}
.room{
  background:white;
  border-radius:10px;
  overflow:hidden;
}
.room img{width:100%}
.room h3{padding:10px}
.room p{padding:0 10px 10px}
.room span{padding:10px;color:#1F3D3B;font-weight:bold}

/* GALLERY */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}
.gallery img{width:100%;border-radius:10px}

/* AMENITIES */
.amenities-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
}
.amenity{
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

/* CONTACT */
form{
  max-width:400px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
input,textarea{padding:10px}

/* BUTTON */
button{
  background:#1F3D3B;
  color:white;
  border:none;
  padding:10px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:12px 20px;
  border-radius:30px;
  color:white;
  text-decoration:none;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<a href="#home">🏠 <span>Home</span></a>
<a href="#rooms">🛏️ <span>Rooms</span></a>
<a href="#gallery">🖼️ <span>Gallery</span></a>
<a href="#amenities">✨ <span>Amenities</span></a>
<a href="#contact">📞 <span>Contact</span></a>
</div>

<div class="main">

<!-- HERO -->
<section id="home" class="hero">
<div>
<h1>Golden Petals</h1>
<p>Comfort · Nature · Luxury</p>
</div>
</section>

<!-- ROOMS -->
<section id="rooms">
<h2>Rooms</h2>
<div class="rooms-grid">

<div class="room">
<img src="https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=800">
<h3>Deluxe Room</h3>
<p>Comfortable stay</p>
<span>₹2500/night</span>
</div>

<div class="room">
<img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=800">
<h3>Executive Room</h3>
<p>Premium comfort</p>
<span>₹3500/night</span>
</div>

<div class="room">
<img src="https://images.unsplash.com/photo-1590490360182-c33d57733427?w=800">
<h3>Suite</h3>
<p>Luxury stay</p>
<span>₹5500/night</span>
</div>

</div>
</section>

<!-- GALLERY -->
<section id="gallery">
<h2>Gallery</h2>
<div class="gallery-grid">
<img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800">
<img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=800">
<img src="https://images.unsplash.com/photo-1578683010236-d716f9a3f461?w=800">
<img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800">
</div>
</section>

<!-- AMENITIES -->
<section id="amenities">
<h2>Amenities</h2>
<div class="amenities-grid">
<div class="amenity">WiFi</div>
<div class="amenity">Parking</div>
<div class="amenity">AC Rooms</div>
<div class="amenity">Room Service</div>
</div>
</section>

<!-- CONTACT -->
<section id="contact">
<h2>Contact</h2>
<form onsubmit="sendWhatsApp(event)">
<input id="name" placeholder="Name" required>
<input id="phone" placeholder="Phone" required>
<textarea id="msg" placeholder="Message"></textarea>
<button>Send</button>
</form>
</section>

</div>

<a href="https://wa.me/91XXXXXXXXXX" class="whatsapp">Book Now</a>

<script>
function sendWhatsApp(e){
e.preventDefault();
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let msg=document.getElementById("msg").value;

let url="https://wa.me/91XXXXXXXXXX?text="
+"Name:"+name+"%0A"
+"Phone:"+phone+"%0A"
+"Message:"+msg;

window.open(url,"_blank");
}
</script>

</body>
</html>
